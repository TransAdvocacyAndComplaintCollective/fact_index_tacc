[request_definition]
# r = sub, dom, obj, act
# - sub: subject (user ID: "user:123456" or role name: "role:admin")
# - dom: domain/scope (guild ID: "987654321")
# - obj: object/resource (REST path: "/api/guilds/:guildId/posts")
# - act: action (HTTP method: "GET", "POST", or regex: "(GET)|(POST)|(DELETE)")
r = sub, dom, obj, act

[policy_definition]
# p = sub, dom, obj, act
# Defines who (sub) can do what (act) to which resource (obj) in which domain (dom)
# 
# Examples:
#   p, role:admin, 1234567890, /api/guilds/:guildId/*, (GET)|(POST)|(PUT)|(PATCH)|(DELETE)
#   p, role:mod, 1234567890, /api/guilds/:guildId/posts/*, (GET)|(POST)|(DELETE)
#   p, role:member, 1234567890, /api/guilds/:guildId/posts, GET
#   p, role:member, 1234567890, /api/guilds/:guildId/posts/:id, GET
p = sub, dom, obj, act

[role_definition]
# g = _, _, _
# Grouping policy for role inheritance with domains
# Format: g, user:userId, role:roleKey, guildId
# 
# This allows role assignment per domain (guild).
# Example:
#   g, user:111, role:admin, 999     (User 111 is admin in guild 999)
#   g, user:111, role:mod, 888       (User 111 is mod in guild 888)
#   g, user:111, role:admin, global  (User 111 is global admin)
g = _, _, _

[policy_effect]
# some(where (p.eft == allow))
# Decision effect: if ANY policy allows access, allow the request
e = some(where (p.eft == allow))

[matchers]
# m = g(r.sub, p.sub, r.dom) && keyMatch2(r.obj, p.obj) && regexMatch(r.act, p.act)
# 
# - g(r.sub, p.sub, r.dom): Check if subject is in role (with domain)
#   Returns true if there's a grouping policy matching (r.sub, p.sub, r.dom)
#   E.g., g(user:111, role:admin, 999) succeeds if policy exists: g, user:111, role:admin, 999
#
# - keyMatch2(r.obj, p.obj): Path pattern matching
#   r.obj = /api/guilds/123/posts/456
#   p.obj = /api/guilds/:guildId/posts/:id
#   Returns true if pattern matches
#   Supported patterns: /* (wildcard), /:param (path param)
#
# - regexMatch(r.act, p.act): HTTP method matching
#   r.act = POST
#   p.act = (GET)|(POST)|(DELETE)
#   Returns true if regex matches
#
# Full matcher: (subject has role in domain) && (path matches pattern) && (method matches action)
m = g(r.sub, p.sub, r.dom) && keyMatch2(r.obj, p.obj) && regexMatch(r.act, p.act)

---

# === POLICY EXAMPLES ===

# Admin role: full access to all guild endpoints
p, role:admin, 999, /api/guilds/:guildId/*, (GET)|(POST)|(PUT)|(PATCH)|(DELETE)

# Moderator role: can manage posts and moderate
p, role:mod, 999, /api/guilds/:guildId/posts/*, (GET)|(POST)|(DELETE)
p, role:mod, 999, /api/guilds/:guildId/moderation/*, (GET)|(POST)

# Member role: read-only + basic write
p, role:member, 999, /api/guilds/:guildId/posts, GET
p, role:member, 999, /api/guilds/:guildId/posts/:id, GET
p, role:member, 999, /api/guilds/:guildId/posts, POST

# Global policies (no guild restriction)
p, user, global, /api/auth/me, GET
p, user, global, /api/auth/status, GET

# === ROLE ASSIGNMENT EXAMPLES ===

# User 111 is admin in guild 999
g, user:111, role:admin, 999

# User 111 is mod in guild 888
g, user:111, role:mod, 888

# User 222 is member in guild 999 (via Discord role mapping)
g, user:222, role:member, 999

# User 111 is global admin (applies across all guilds)
g, user:111, role:app:admin, global

---

# === DISCORD ROLE MAPPING ===
# Stored in discord_role_map table:
# | guild_id | discord_role_id | role_key |
# |----------|-----------------|----------|
# | 999      | role:123        | admin    |
# | 999      | role:456        | mod      |
# | 999      | role:789        | member   |

# When a user logs in or syncs, we:
# 1. Read their Discord roles from the guild
# 2. Look up discord_role_map to find local role_keys
# 3. Create grouping policies: g, user:userId, role:roleKey, guildId

---

# === LOCAL ROLE ASSIGNMENT ===
# Stored in user_local_role table:
# | discord_user_id | role_key | guild_id |
# |-----------------|----------|----------|
# | user:111        | admin    | 999      |  ← Guild-scoped
# | user:222        | viewer   | NULL     |  ← Global

# During role sync, we add grouping policies for both:
# - g, user:111, role:admin, 999
# - g, user:222, role:viewer, global
