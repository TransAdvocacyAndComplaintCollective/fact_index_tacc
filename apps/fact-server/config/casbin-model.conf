[request_definition]
# This file is documentation only.
#
# The running server uses an in-code Casbin model (see `apps/fact-server/src/auth/casbin/enforcer.ts`).
#
# r = sub, dom, obj, act
# - sub: subject, either:
#   - `user:{discordUserId}` (direct user permissions)
#   - `role:discord:{discordRoleId}` (role permissions)
# - dom: domain/scope (we use `"global"` for the API)
# - obj: resource (e.g. `"fact"`, `"taxonomy"`, `"admin"`)
# - act: action (e.g. `"read"`, `"write"`, `"pubwrite"`, `"admin"`)
r = sub, dom, obj, act

[policy_definition]
p = sub, dom, obj, act

[role_definition]
# g = _, _, _
# Grouping policy:
# - Attach a Discord user to a Discord role, in the `"global"` domain:
#   g, user:{discordUserId}, role:discord:{discordRoleId}, global
g = _, _, _

[policy_effect]
# some(where (p.eft == allow))
# Decision effect: if ANY policy allows access, allow the request
e = some(where (p.eft == allow))

[matchers]
# Conceptually:
# - Allow if a user is in a Discord role that has permission for (resource, action),
#   OR the user has a direct permission.
m = g(r.sub, p.sub, r.dom) && r.obj == p.obj && (p.act == "superuser" || r.act == p.act)

---

# === EXAMPLES (global) ===
# Give a Discord role permission to publish facts:
#   p, role:discord:1234567890, global, fact, pubwrite
#
# Give a specific Discord user a superuser permission:
#   p, user:987654321, global, global, superuser
# | discord_user_id | role_key | guild_id |
# |-----------------|----------|----------|
# | user:111        | admin    | 999      |  ← Guild-scoped
# | user:222        | viewer   | NULL     |  ← Global

# During role sync, we add grouping policies for both:
# (Legacy note) Older examples used `role:admin`/`role:mod`; this repo uses `role:discord:{discordRoleId}`.
# - g, user:222, role:viewer, global
