[request_definition]
r = sub, obj, act, env

[policy_definition]
p = priority, provider, id_type, id_value, match, min_clearance, \
    obj_project, obj_subProject, obj_task, obj_subTask, \
    http_method, http_pattern, http_mode, \
    lbac_op, start_ts, end_ts, eft

[role_definition]
g = _, _

[policy_effect]
e = priority(p.eft) || deny

[matchers]
m = 
  providerMatch(r.sub, p.provider) &&
  loginFactMatch(r.sub, p.id_type, p.id_value, p.match) &&
  cmp(r.sub.clearance, p.lbac_op, p.min_clearance) &&
  (
    (p.match == "ProjectMatch" && objProjectMatch(r.obj, p.obj_project, p.obj_subProject, p.obj_task, p.obj_subTask)) || 
    (p.match == "keyMatch"   && keyMatch(r.obj, p.http_pattern)   && (!p.http_method || r.act == p.http_method)) || 
    (p.match == "keyMatch2"  && keyMatch2(r.obj, p.http_pattern)  && (!p.http_method || r.act == p.http_method)) || 
    (p.match == "keyMatch3"  && keyMatch3(r.obj, p.http_pattern)  && (!p.http_method || r.act == p.http_method)) || 
    (p.match == "keyMatch4"  && keyMatch4(r.obj, p.http_pattern)  && (!p.http_method || r.act == p.http_method)) || 
    (p.match == "keyMatch5"  && keyMatch5(r.obj, p.http_pattern)  && (!p.http_method || r.act == p.http_method)) || 
    (p.match == "globMatch"  && globMatch(r.obj, p.http_pattern)  && (!p.http_method || r.act == p.http_method)) || 
    (p.match == "regexMatch" && regexMatch(r.obj, p.http_pattern)  && (!p.http_method || r.act == p.http_method))
  ) &&
  within(r.env.now, p.start_ts, p.end_ts)
